<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alkoholilaskuri</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans pb-12">

    <div class="max-w-md mx-auto px-4 pt-6">
        <header class="text-center my-6 bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
            <h1 class="text-xl font-bold text-slate-400 tracking-wide uppercase">Veren alkoholipitoisuus</h1>
            <div id="promille-display" class="text-6xl font-black my-3 text-emerald-400 transition-colors duration-500">0.00 ‰</div>
            <p id="burn-time-display" class="text-sm text-slate-400">Keho on puhdas alkoholista.</p>
        </header>

        <div class="bg-slate-800/50 p-4 rounded-xl mb-6 border border-slate-700/50">
            <div class="flex justify-between items-center text-sm">
                <div>Istunnon juomat: <span id="session-count" class="font-bold text-amber-400">0</span> kpl</div>
                <div>Alkoholi: <span id="session-grams" class="font-bold text-amber-400">0</span> g</div>
                <button id="btn-clear-session" class="text-xs text-red-400 border border-red-900 hover:bg-red-900/30 px-2 py-1 rounded-lg transition-colors">
                    Tyhjennä
                </button>
            </div>
        </div>

        <!-- Promillekuvaaja -->
        <div id="chart-section" class="hidden bg-slate-800 p-4 rounded-2xl shadow-xl border border-slate-700 mb-6">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">Promillikäyrä</p>
            <canvas id="bac-chart" class="w-full block" style="height: 150px;"></canvas>
        </div>

        <main class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 space-y-4">
            <h2 class="text-lg font-bold border-b border-slate-700 pb-2 text-amber-400">Kirjaa uusi juoma</h2>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">1. Valitse juoma</label>
                <div class="flex flex-wrap gap-2" id="drink-type-buttons">
                </div>
                <div class="mt-2 flex gap-2">
                    <input type="text" id="custom-drink-name" placeholder="Uusi oma juomalaji..." class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 text-sm w-full focus:outline-none focus:border-amber-500">
                    <button type="button" id="btn-add-custom" class="bg-slate-750 border border-slate-600 hover:bg-slate-700 text-amber-400 text-sm px-3 rounded-lg font-bold">+</button>
                </div>
            </div>

            <div>
                <label for="select-abv" class="block text-xs font-semibold text-slate-400 uppercase mb-1">2. Alkoholipitoisuus (%)</label>
                <select id="select-abv" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 focus:outline-none focus:border-amber-500 text-lg">
                </select>
            </div>

            <div>
                <label for="input-volume" class="block text-xs font-semibold text-slate-400 uppercase mb-1">3. Määrä (ml)</label>
                <div class="flex gap-2 mb-2">
                    <button type="button" onclick="setVolume(120)" class="flex-1 bg-slate-700 hover:bg-slate-600 text-xs py-1.5 rounded-lg">12 cl (Viini)</button>
                    <button type="button" onclick="setVolume(330)" class="flex-1 bg-slate-700 hover:bg-slate-600 text-xs py-1.5 rounded-lg">33 cl (Pullo)</button>
                    <button type="button" onclick="setVolume(500)" class="flex-1 bg-slate-700 hover:bg-slate-600 text-xs py-1.5 rounded-lg">50 cl (Tuoppi)</button>
                </div>
                <input type="number" id="input-volume" value="330" min="1" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-center text-xl font-bold focus:outline-none focus:border-amber-500">
            </div>

            <button type="button" id="btn-save" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-black text-lg py-4 rounded-xl shadow-lg transition-transform active:scale-95 uppercase tracking-wider mt-4">
                Tallenna juoma
            </button>

            <div class="pt-1">
                <button type="button" id="btn-time-toggle" class="flex items-center gap-1.5 text-xs text-slate-500 hover:text-amber-400 active:text-amber-400 transition-colors py-1">
                    <span id="time-toggle-icon" class="text-base leading-none">⏱</span>
                    <span id="time-toggle-label">Unohditko merkitä? Aseta kellonaika</span>
                </button>
                <div id="time-input-row" class="hidden mt-2 space-y-2">
                    <select id="select-time-ago"
                        class="w-full bg-slate-900 border border-amber-700/60 rounded-xl px-3 py-3 text-sm focus:outline-none focus:border-amber-500 text-slate-200">
                        <option value="15">15 min sitten</option>
                        <option value="30">30 min sitten</option>
                        <option value="45">45 min sitten</option>
                        <option value="60">1 h sitten</option>
                        <option value="90">1 h 30 min sitten</option>
                        <option value="120">2 h sitten</option>
                        <option value="150">2 h 30 min sitten</option>
                        <option value="180">3 h sitten</option>
                        <option value="240">4 h sitten</option>
                        <option value="300">5 h sitten</option>
                        <option value="360">6 h sitten</option>
                        <option value="480">8 h sitten</option>
                        <option value="600">10 h sitten</option>
                        <option value="720">12 h sitten</option>
                    </select>
                    <p id="time-result-label" class="text-xs text-amber-400/80 pl-1"></p>
                </div>
            </div>
        </main>

        <section class="bg-slate-800/80 rounded-2xl shadow-xl border border-slate-700 mt-6 overflow-hidden">
            <button id="btn-stats-toggle" class="w-full flex justify-between items-center px-6 py-4 text-left active:bg-slate-700/50 transition-colors">
                <h2 class="text-base font-bold text-slate-300">📊 Tilasto — viimeiset 24 h</h2>
                <span id="stats-arrow" class="text-slate-400 text-lg leading-none transition-transform duration-200">▶</span>
            </button>
            <div id="stats-content" class="hidden px-6 pb-5">
                <div id="stats-list" class="text-sm text-slate-500 text-center py-2">Ladataan...</div>
            </div>
        </section>

        <section class="bg-slate-800/80 p-6 rounded-2xl shadow-xl border border-slate-700 mt-6 space-y-4">
            <h2 class="text-base font-bold text-slate-300 border-b border-slate-700 pb-2">Käyttäjätiedot (Laskentaa varten)</h2>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="input-weight" class="block text-xs font-semibold text-slate-400 uppercase mb-1">Paino (kg)</label>
                    <input type="number" id="input-weight" value="80" min="30" max="250" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-center focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label for="select-gender" class="block text-xs font-semibold text-slate-400 uppercase mb-1">Sukupuoli</label>
                    <select id="select-gender" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2.5 focus:outline-none focus:border-amber-500">
                        <option value="male">Mies</option>
                        <option value="female">Nainen</option>
                    </select>
                </div>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
    <script>
        // Rekisteröidään PWA Service Worker offline-tilaa varten
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("Service Worker rekisteröity."))
                .catch(err => console.error("SW virhe:", err));
        }
    </script>
</body>
</html>
